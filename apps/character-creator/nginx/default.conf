# Minimal static-only config for the foundry-character-creator bundle
# image. This image's primary job is to carry the Vite dist/ at
# /usr/share/nginx/html/ so foundry-mcp can COPY --from=... it during
# its own Docker build. When the image is run standalone, nginx serves
# the SPA directly.

server {
  listen      8080 default_server;
  server_name _;
  root        /usr/share/nginx/html;
  index       index.html;

  # Content-hashed Vite assets — cache aggressively.
  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Liveness / readiness probe.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # SPA fallback — unmatched paths boot the React app.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
