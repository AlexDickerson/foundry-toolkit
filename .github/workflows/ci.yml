name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: ESLint
        run: npx eslint .

      - name: Prettier
        run: npm run format:check

      - name: TypeScript
        run: npm run typecheck

      - name: Tests
        run: |
          npm run test --workspace apps/dm-tool
          npm run test --workspace apps/character-creator
          npm run test --workspace apps/foundry-api-bridge
          npm run test --workspace packages/shared

  electronegativity:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20.19.0

      - uses: doyensec/electronegativity-action@v2
        with:
          input: apps/dm-tool

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ../electronegativity_results/out.sarif
          category: electronegativity
