# Fly.io app config for foundry-mcp.
#
# Deploy with:
#   fly launch --no-deploy             # first time (adjusts app name if taken)
#   fly secrets set OPENAI_API_KEY=... # required for edit_image tool
#   fly deploy --remote-only --image ghcr.io/alexdickerson/foundry-mcp:latest
#
# The GitHub Actions fly-deploy workflow does the last step on every merge to
# main after the Docker workflow publishes a fresh `:latest` tag.
#
# min_machines_running=1 + no auto-stop: the Foundry module opens an outbound
# WebSocket to /foundry and keeps it open. Auto-stopping the VM would drop
# that connection; force it to stay warm.

app = "foundry-mcp"
primary_region = "iad"  # change to fra/syd/etc for your region of choice

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
